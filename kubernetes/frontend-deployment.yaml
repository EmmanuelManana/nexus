apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-web
  namespace: nexus
  labels:
    app: nexus-web
    app.kubernetes.io/name: nexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-web
  template:
    metadata:
      labels:
        app: nexus-web
        app.kubernetes.io/name: nexus
    spec:
      containers:
        - name: web
          image: nexus-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              memory: "32Mi"
              cpu: "20m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexus-web-pdb
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nexus-web

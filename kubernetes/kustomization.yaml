# Kustomization for Nexus (Rancher / Argo CD).
# Override images for your registry, e.g.:
#   kustomize edit set image nexus-api=YOUR_REGISTRY/nexus-api:latest nexus-web=YOUR_REGISTRY/nexus-web:latest
# Or set in Argo CD Application / Image Updater.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: nexus
resources:
  - namespace.yaml
  - configmap.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - ingress.yaml
images:
  - name: nexus-api
    newName: nexus-api
    newTag: latest
  - name: nexus-web
    newName: nexus-web
    newTag: latest
